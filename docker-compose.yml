version: '3.9'

services:
  # ──────────────────────────────────────────────────────────
  # Внутренняя БД портала клиента
  # ──────────────────────────────────────────────────────────
  db-internal:
    image: postgres:16-alpine
    container_name: tppo-db-internal
    restart: unless-stopped
    environment:
      POSTGRES_DB: tppo_portal
      POSTGRES_USER: tppo
      POSTGRES_PASSWORD: tppo_pass
    ports:
      - "5432:5432"
    volumes:
      - db-internal-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tppo -d tppo_portal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Внешняя БД (симуляция 1С / vn_bd+td.sql)
  # ──────────────────────────────────────────────────────────
  db-external:
    image: postgres:16-alpine
    container_name: tppo-db-external
    restart: unless-stopped
    environment:
      POSTGRES_DB: neo_1c
      POSTGRES_USER: tppo
      POSTGRES_PASSWORD: tppo_pass
    ports:
      - "5433:5432"
    volumes:
      - db-external-data:/var/lib/postgresql/data
      - ./backend/docker/init-external.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tppo -d neo_1c"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # MinIO — хранилище файлов (S3-совместимое)
  # ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: tppo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  db-internal-data:
  db-external-data:
  minio-data:
