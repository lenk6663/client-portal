<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Мои обращения — Неосистемы Северо-Запад</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #e9e2dc;
      min-height: 100vh;
      overflow-x: hidden;
      color: #1f1f1f;
      position: relative;
    }

    /* Сайдбар фиксированный слева (как в дашборде) */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 250px;
      height: 100vh;
      padding: 28px 0 0 28px;
      background: #e9e2dc;
      transition: left 0.3s ease;
      z-index: 1000;
      transform: translateX(0);
    }

    /* Оверлей для мобильного меню */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(2px);
      z-index: 900;
      transition: 0.2s ease;
    }

    .overlay.active {
      display: block;
    }

    .logo-image {
      display: block;
      width: 100%;
      max-width: 180px;
      margin-bottom: 48px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .logo-image:hover {
      opacity: 0.8;
    }
    
    .logo-image img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 17px;
      color: #8b8784;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu-item.active {
      color: #000;
      font-weight: 600;
    }

    .menu-item svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* Основная область */
    .main {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #e9e2dc;
      overflow-y: auto;
      position: relative;
    }

    /* Контент со сдвигом под сайдбар */
    .content-wrapper {
      margin-left: 250px;
      padding: 28px 42px 42px 42px;
      width: calc(100% - 250px);
      transition: margin 0.3s ease;
    }

    /* Десктопный блок профиля (как в дашборде) */
    .profile {
      position: fixed;
      top: 36px;
      right: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      padding: 6px 12px 6px 8px;
      border-radius: 60px;
      transition: background 0.2s;
      color: #1a1a1a;
      font-size: 18px;
      font-weight: 600;
    }

    .profile-info:hover {
      background: rgba(0, 0, 0, 0.06);
    }

    .profile-icon {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logout-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 6px;
      border-radius: 40px;
      transition: background 0.2s;
    }

    .logout-btn:hover {
      background: rgba(0, 0, 0, 0.08);
    }

    .logout-icon {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logout-tooltip {
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      color: white;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 30;
      font-family: 'Inter', sans-serif;
    }

    .logout-btn:hover .logout-tooltip {
      opacity: 1;
    }

    /* Мобильная верхняя панель */
    .mobile-topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 0 18px;
      gap: 12px;
      background: #e9e2dc;
      z-index: 15;
      width: 100%;
      position: sticky;
      top: 0;
    }

    .burger {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      border: none;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      flex-shrink: 0;
    }

    .burger span {
      width: 22px;
      height: 2.5px;
      background: #1e1e1e;
      border-radius: 2px;
    }

    .mobile-user-area {
      display: flex;
      align-items: center;
      gap: 14px;
      background: transparent;
      flex: 1;
      justify-content: flex-end;
    }

    .mobile-profile-clickable {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      background: transparent;
      padding: 4px 8px 4px 4px;
      border-radius: 40px;
      transition: background 0.2s;
    }

    .mobile-profile-clickable:hover {
      background: rgba(0, 0, 0, 0.06);
    }

    .mobile-user-name {
      font-size: 17px;
      font-weight: 600;
      color: #1f1f1f;
      white-space: nowrap;
    }

    .mobile-profile-icon {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.06);
      border-radius: 50%;
    }

    .mobile-logout-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 6px;
      border-radius: 40px;
      transition: background 0.2s;
    }

    .mobile-logout-wrapper:hover {
      background: rgba(0, 0, 0, 0.08);
    }

    .mobile-logout-icon {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 50%;
    }

    .mobile-logout-tooltip {
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      color: white;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 30;
      font-family: 'Inter', sans-serif;
    }

    .mobile-logout-wrapper:hover .mobile-logout-tooltip {
      opacity: 1;
    }

    /* Заголовок */
    .page-head {
      margin-bottom: 20px;
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      color: #000;
      letter-spacing: -0.3px;
      margin-bottom: 16px;
    }

    /* Поисковая строка */
    .search-row {
      margin-bottom: 20px;
     }
    
    .search {
      width: 100%;;
      height: 46px;
      border: 2px solid #b9b0a9;
      border-radius: 14px;
      background: #f3efeb;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
    }

    .search i {
      color: #8c857f;
      font-size: 18px;
      font-style: normal;
      font-weight: 400;
    }

    .search input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      color: #222;
    }

    .search input::placeholder {
      color: #9f9892;
    }

    /* Блок фильтров */
    .filters-section {
      margin-bottom: 24px;
    }

    .filters-label {
      font-size: 14px;
      font-weight: 600;
      color: #5e554e;
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-chip {
      height: 38px;
      padding: 0 20px;
      border-radius: 30px;
      border: 1.5px solid #c2b9b2;
      background: transparent;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
      color: #5e554e;
    }
    
    .filter-chip:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: translateY(-1px);
    }
    
    .filter-chip.active {
      background: #ff8244;
      border-color: #ff8244;
      color: #fff;
    }

    /* Карточка с таблицей (как в дашборде) */
    .card {
      width: 100%;
      background: linear-gradient(110deg, #fffdf7 0%, #f5b28d 100%);
      border-radius: 28px;
      box-shadow: 18px 20px 28px rgba(0, 0, 0, 0.2);
      padding: 28px 24px 32px 24px;
      margin-bottom: 28px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .card-header h2 {
      font-size: 24px;
      font-weight: 800;
      color: #000;
    }

    .sub-info {
      color: #a0958d;
      font-size: 14px;
      margin-bottom: 20px;
      font-weight: 500;
    }

    /* Таблица */
    .table-wrap {
      overflow-x: auto;
      overflow-y: auto;
      max-height: 55vh;
      border-radius: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    thead {
      background: rgba(245, 178, 141, 0.35);
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(4px);
      border-radius: 16px;
    }

    th {
      padding: 14px 12px;
      text-align: left;
      font-size: 14px;
      font-weight: 800;
      color: #1f1f1f;
      white-space: nowrap;
    }

    td {
      padding: 12px 12px;
      font-size: 14px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.07);
      color: #2a2a2a;
      white-space: nowrap;
    }

    /* Marquee — ячейки усекаются до ~15 знаков, на hover «бегущая строка» */
    .marquee-cell {
      display: inline-block;
      max-width: 130px;
      overflow: hidden;
      white-space: nowrap;
      vertical-align: middle;
      position: relative;
    }
    .marquee-cell .marquee-inner {
      display: inline-block;
      white-space: nowrap;
      max-width: 130px;
      text-overflow: ellipsis;
      overflow: hidden;
      vertical-align: bottom;
      transition: transform 0.3s ease;
    }
    .marquee-cell.marquee-active .marquee-inner {
      max-width: none;
      overflow: visible;
      text-overflow: clip;
    }
    /* Чуть шире для длинных полей (тема) */
    .marquee-cell.wide {
      max-width: 180px;
    }
    .marquee-cell.wide .marquee-inner {
      max-width: 180px;
    }

    tbody tr {
      transition: 0.15s;
      cursor: pointer;
      border-radius: 16px;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: scale(1.002);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 700;
    }

    .status-badge.done {
      background: #e8f4e6;
      color: #2e7d32;
    }

    .status-badge.progress {
      background: #fff3df;
      color: #ef6c00;
    }

    .status-badge.new {
      background: #e8f1ff;
      color: #1565c0;
    }

    .status-badge.eval {
      background: #f3e5f5;
      color: #7b1fa2;
    }

    .status-badge.approval {
      background: #e3f2fd;
      color: #0d47a1;
    }

    .status-badge.cancelled {
      background: #f5f5f5;
      color: #616161;
    }

    .date-chip {
      display: inline-flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.05);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 13px;
    }

    /* Кнопка создания обращения */
    .create-btn-bottom {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .create-btn-wide {
      background: linear-gradient(90deg, #f2c04d 0%, #ff8244 100%);
      border: none;
      border-radius: 16px;
      padding: 14px 36px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .create-btn-wide:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.18);
    }

    /* Секция обратных звонков */
    .callback-section {
      margin-top: 8px;
    }

    .cb-title {
      font-size: 20px;
      font-weight: 800;
      color: #1f1f1f;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cb-title::after {
      content: '';
      flex: 1;
      height: 2px;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 2px;
    }

    /* Адаптивность */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -280px;
        width: 280px;
        height: 100vh;
        transform: none;
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.1);
        transition: left 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }

      .sidebar.active {
        left: 0;
      }

      .content-wrapper {
        margin-left: 0;
        width: 100%;
        padding: 16px;
      }

      .profile {
        display: none;
      }

      .mobile-topbar {
        display: flex;
        margin-bottom: 8px;
      }

      .title {
        font-size: 24px;
        margin-bottom: 12px;
      }

      .card {
        padding: 20px 16px;
        border-radius: 24px;
      }

      .card-header h2 {
        font-size: 20px;
      }

      .table-wrap {
        max-height: 50vh;
      }

      th, td {
        padding: 10px 8px;
        font-size: 13px;
      }

      .filter-chip {
        height: 34px;
        padding: 0 14px;
        font-size: 13px;
      }

      .create-btn-wide {
        width: 100%;
        justify-content: center;
        padding: 12px 20px;
        font-size: 16px;
      }
      
      .filters {
        gap: 8px;
      }
    }

    @media (max-width: 480px) {
      .content-wrapper {
        padding: 12px;
      }
      
      .title {
        font-size: 22px;
      }
      
      .card {
        padding: 16px 12px;
      }
      
      .filter-chip {
        height: 32px;
        padding: 0 12px;
        font-size: 12px;
      }
      
      th, td {
        padding: 8px 6px;
        font-size: 12px;
      }
      
      .status-badge {
        padding: 3px 8px;
        font-size: 11px;
      }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .content-wrapper {
        padding: 20px 28px;
      }
      
      .table-wrap {
        max-height: 58vh;
      }
    }

    @media (min-width: 1600px) {
      .content-wrapper {
        padding: 32px 56px;
      }
      
      .card {
        padding: 36px 32px;
      }
      
      .title {
        font-size: 36px;
      }
      
      th, td {
        padding: 16px 16px;
        font-size: 15px;
      }
    }

    ::-webkit-scrollbar {
      width: 7px;
      height: 7px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #b2957b;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Сайдбар как в дашборде -->
<div class="sidebar" id="sidebar">
  <div class="logo-image" id="logoDashboardBtn">
    <img src="https://neosystems.ru/upload/CAllcorp2/cf6/%D0%9D%D0%B5%D0%BE%D1%81%D0%B8%D1%81%D1%82%D0%B5%D0%BC%D1%8B.png" 
         alt="Неосистемы Северо-Запад" 
         onerror="this.onerror=null; this.src='https://placehold.co/200x60?text=Neosystems';">
  </div>
  
  <nav class="menu">
    <div class="menu-item" data-route="dashboard">
      <svg viewBox="0 0 24 24">
        <path d="M12 3l9 8h-3v10h-5v-6H11v6H6V11H3z"/>
      </svg>
      <span>Главный</span>
    </div>

    <div class="menu-item active" data-route="my-tickets">
      <svg viewBox="0 0 24 24">
        <path d="M3 13h4v8H3zm7-6h4v14h-4zm7-4h4v18h-4z"/>
      </svg>
      <span>Мои обращения</span>
    </div>

    <div class="menu-item" data-route="call-order">
      <svg viewBox="0 0 24 24">
        <path d="M6.6 10.8c1.5 2.9 3.8 5.2 6.7 6.7l2.2-2.2c.3-.3.7-.4 1.1-.3 1.2.4 2.5.6 3.8.6.6 0 1 .4 1 1V21c0 .6-.4 1-1 1C10.3 22 2 13.7 2 3c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.6.6 3.8.1.4 0 .8-.3 1.1l-2.2 2.1z"/>
      </svg>
      <span>Заказать звонок</span>
    </div>

    <div class="menu-item" data-route="settings">
      <svg viewBox="0 0 24 24">
        <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.58.22-1.12.53-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.14.24.43.34.69.22l2.39-.96c.51.41 1.05.72 1.63.94l.36 2.54c.04.24.25.42.5.42h3.84c.25 0 .46-.18.5-.42l.36-2.54c.58-.22 1.12-.53 1.63-.94l2.39.96c.26.12.55.02.69-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5z"/>
      </svg>
      <span>Настройки</span>
    </div>
  </nav>
</div>

<main class="main">
  <!-- Мобильная шапка -->
  <div class="mobile-topbar">
    <button class="burger" id="burgerBtn" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    
    <div class="mobile-user-area">
      <div class="mobile-profile-clickable" id="mobileProfileClickable">
        <div class="mobile-profile-icon">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="#2c2c2c">
            <path d="M12 12c2.76 0 5-2.24 5-5S14.76 2 12 2 7 4.24 7 7s2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/>
          </svg>
        </div>
        <span class="mobile-user-name" id="mobileUserName">...</span>
      </div>
      <div class="mobile-logout-wrapper" id="mobileLogoutBtn">
        <div class="mobile-logout-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="#4a3b32">
            <path d="M10 17l1.41-1.41L8.83 13H20v-2H8.83l2.58-2.59L10 7l-5 5zm-6 2h6v2H4c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h6v2H4v14z"/>
          </svg>
        </div>
        <span class="mobile-logout-tooltip">Выход</span>
      </div>
    </div>
  </div>

  <!-- Десктопный профиль -->
  <div class="profile">
    <div class="profile-info" id="desktopProfileInfo">
      <div class="profile-icon">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="#111">
          <path d="M12 12c2.76 0 5-2.24 5-5S14.76 2 12 2 7 4.24 7 7s2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/>
        </svg>
      </div>
      <span id="desktopUserName">...</span>
    </div>
    <div class="logout-btn" id="desktopLogoutBtn">
      <div class="logout-icon">
        <svg viewBox="0 0 24 24" width="30" height="30" fill="#111">
          <path d="M10 17l1.41-1.41L8.83 13H20v-2H8.83l2.58-2.59L10 7l-5 5zm-6 2h6v2H4c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h6v2H4v14z"/>
        </svg>
      </div>
      <span class="logout-tooltip">Выход</span>
    </div>
  </div>

  <div class="content-wrapper">
    <!-- Заголовок -->
    <div class="page-head">
      <h1 class="title">Мои обращения</h1>
    </div>

    <!-- Поиск -->
    <div class="search-row">
      <div class="search">
        <i>🔍</i>
        <input type="text" id="searchInput" placeholder="Поиск по номеру, теме, услуге...">
      </div>
    </div>

    <!-- Блок фильтров -->
    <div class="filters-section">
      <div class="filters" id="filterBar">
        <button class="filter-chip active" data-filter="all">Все</button>
        <button class="filter-chip" data-filter="new">Новые</button>
        <button class="filter-chip" data-filter="progress">В работе</button>
        <button class="filter-chip" data-filter="pending_eval">На оценке</button>
        <button class="filter-chip" data-filter="on_approval">На согласовании</button>
        <button class="filter-chip" data-filter="done">Завершено</button>
        <button class="filter-chip" data-filter="cancelled">Отменено</button>
      </div>
    </div>

    <!-- Карточка с таблицей обращений -->
    <div class="card">
      <div class="card-header">
        <h2>Список обращений</h2>
      </div>
      <div class="sub-info" id="ticketsCountInfo">Всего обращений: 0</div>
      <div class="table-wrap">
        <table id="ticketsTable">
          <thead>
            <tr>
              <th>№</th>
              <th>Дата создания</th>
              <th>Тема</th>
              <th>Услуга</th>
              <th>Статус</th>
              <th>Ответственный</th>
              <th>Часы</th>
              <th>Стоимость (₽)</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- данные из localStorage -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Секция обратных звонков (если есть) -->
    <div id="callbackSection" style="display:none" class="callback-section">
      <div class="cb-title">📞 История обратных звонков</div>
      <div class="card">
        <div class="table-wrap">
          <table id="callbackTable">
            <thead><tr><th>№</th><th>Дата</th><th>Тема</th><th>Статус</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Кнопка создания обращения -->
    <div class="create-btn-bottom">
      <button class="create-btn-wide" id="createTicketFullBtn">＋ Создать обращение</button>
    </div>
  </div>
</main>

<script src="api.js"></script>
<script>
// ---- Имя пользователя
var nameEls = [document.getElementById('desktopUserName'), document.getElementById('mobileUserName')];
function setUserName(name) {
  nameEls.forEach(function(el){ if(el) el.textContent = name; });
}
setUserName(TPPO.Auth.getDisplayName());
TPPO.getProfile().then(function(p){ if(p && p.name) setUserName(p.name.split(' ')[0]); });

// ---- Навигация
function handleRoute(route){
  var map={'dashboard':'Дашборд.html','my-tickets':'МоиОбращения.html','call-order':'ОбратныйЗвонок.html','settings':'Настройки.html'};
  if(map[route]) window.location.href=map[route];
}

// Marquee на hover
function bindMarquee(el) {
  if (!el || el._marqueeBound) return;
  el._marqueeBound = true;
  var inner = el.querySelector('.marquee-inner');
  if (!inner) return;
  el.addEventListener('mouseenter', function() {
    el.classList.add('marquee-active');
    requestAnimationFrame(function() {
      var overflow = inner.scrollWidth - el.clientWidth;
      if (overflow <= 4) { el.classList.remove('marquee-active'); return; }
      var duration = Math.max(2, overflow / 40);
      inner.style.transition = 'transform ' + duration + 's linear 0.2s';
      requestAnimationFrame(function() {
        inner.style.transform = 'translateX(-' + overflow + 'px)';
      });
    });
  });
  el.addEventListener('mouseleave', function() {
    inner.style.transition = 'transform 0.3s ease';
    inner.style.transform = 'translateX(0)';
    setTimeout(function() { el.classList.remove('marquee-active'); }, 300);
  });
}
function mc(text, wide) {
  return '<span class="marquee-cell' + (wide ? ' wide' : '') +
         '"><span class="marquee-inner">' + escHtml(text) + '</span></span>';
}

var sidebar = document.getElementById('sidebar');
var overlay  = document.getElementById('overlay');

function openSidebar()  { if(window.innerWidth<=768){ sidebar.classList.add('active'); if(overlay) overlay.classList.add('active'); document.body.style.overflow='hidden'; } }
function closeSidebar() { sidebar.classList.remove('active'); if(overlay) overlay.classList.remove('active'); document.body.style.overflow=''; }
window.toggleSidebar = function(){ sidebar.classList.contains('active') ? closeSidebar() : openSidebar(); };
if(overlay) overlay.addEventListener('click', closeSidebar);

var tx=0;
document.addEventListener('touchstart', function(e){ tx=e.changedTouches[0].clientX; });
document.addEventListener('touchend',   function(e){ var d=e.changedTouches[0].clientX-tx; if(window.innerWidth<=768){ if(d>70&&!sidebar.classList.contains('active')) openSidebar(); if(d<-70&&sidebar.classList.contains('active')) closeSidebar(); } });
window.addEventListener('resize', function(){ if(window.innerWidth>768&&sidebar.classList.contains('active')){ sidebar.classList.remove('active'); if(overlay) overlay.classList.remove('active'); document.body.style.overflow=''; } });

document.querySelectorAll('[data-route]').forEach(function(item){
  item.addEventListener('click', function(e){ e.stopPropagation(); handleRoute(item.dataset.route); if(window.innerWidth<=768) setTimeout(closeSidebar,80); });
});
var logoBtn = document.getElementById('logoDashboardBtn');
if(logoBtn) logoBtn.addEventListener('click', function(){ window.location.href='Дашборд.html'; });

['#desktopProfileInfo','#mobileProfileClickable'].forEach(function(sel){ var el=document.querySelector(sel); if(el) el.addEventListener('click',function(){ window.location.href='Настройки.html'; }); });

['#desktopLogoutBtn','#mobileLogoutBtn'].forEach(function(sel){
  var el=document.querySelector(sel);
  if(el) el.addEventListener('click', async function(){
    await TPPO.logout();
    window.location.href='ФормаВхода.html';
  });
});

// ---- Рендер таблицы обращений

var allTickets = [];

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getStatusCss(status){
  return TPPO.STATUS_CSS[status] || 'new';
}

function renderTickets(){
  var activeFilter = document.querySelector('.filter-chip.active');
  activeFilter = activeFilter ? (activeFilter.dataset.filter || 'all') : 'all';
  var searchInput = document.getElementById('searchInput');
  var searchTerm  = searchInput ? searchInput.value.toLowerCase().trim() : '';

  // Обычные обращения (без callback)
  var filtered = allTickets.filter(function(t){ return t.type !== 'callback'; });
  if(activeFilter !== 'all'){
    var filterMap = { 'progress': 'in_progress' };
    var statusCode = filterMap[activeFilter] || activeFilter;
    filtered = filtered.filter(function(t){ return t.status === statusCode; });
  }
  if(searchTerm) filtered = filtered.filter(function(t){
    return (t.subject||'').toLowerCase().includes(searchTerm) ||
           (t.service||'').toLowerCase().includes(searchTerm) ||
           (t.number||'').toLowerCase().includes(searchTerm)  ||
           (t.responsible||'').toLowerCase().includes(searchTerm);
  });

  var countSpan = document.getElementById('ticketsCountInfo');
  if(countSpan) countSpan.textContent = 'Всего обращений: '+filtered.length;

  var tbody = document.getElementById('tableBody');
  if(!tbody) return;
  tbody.innerHTML='';

  if(filtered.length===0){
    var tr=document.createElement('tr');
    tr.innerHTML='<td colspan="8" style="text-align:center;color:#999;padding:32px">Нет обращений с выбранными параметрами</td>';
    tbody.appendChild(tr);
  } else {
    filtered.forEach(function(t){
      var tr=document.createElement('tr');
      tr.dataset.id=t.id;
      var svcLabel=(t.services&&t.services.length>1)?t.services[0]+' +'+(t.services.length-1):(t.service||'—');
      var costDisplay = (t.cost && typeof t.cost==='number' && t.cost > 0) ? t.cost.toLocaleString('ru-RU') : '—';
      var hoursDisplay = (t.hours && t.hours > 0) ? String(t.hours) : '—';
      tr.innerHTML='<td>'+mc(t.number)+'</td>'+
        '<td><span class="date-chip">'+escHtml(t.createdAt)+'</span></td>'+
        '<td>'+mc(t.subject, true)+'</td>'+
        '<td>'+mc(svcLabel)+'</td>'+
        '<td><span class="status-badge '+getStatusCss(t.status)+'">'+escHtml(t.statusLabel)+'</span></td>'+
        '<td>'+mc(t.responsible||'—')+'</td>'+
        '<td>'+hoursDisplay+'</td>'+
        '<td>'+costDisplay+'</td>';
      tr.addEventListener('click', function(){
        if (!t.id) { console.error('[МоиОбращения] клик по тикету без id:', t); return; }
        sessionStorage.setItem('currentTicketId', t.id);
        window.location.href='ДеталиОбращения.html?id='+encodeURIComponent(t.id);
      });
      tbody.appendChild(tr);
      tr.querySelectorAll('.marquee-cell').forEach(bindMarquee);
    });
  }

  // Звонки (callback)
  renderCallbacks();
}

function renderCallbacks(){
  var callbacks = allTickets.filter(function(t){ return t.type === 'callback'; });
  var section = document.getElementById('callbackSection');
  if(!section) return;

  if(!callbacks.length){
    section.style.display='none';
    return;
  }
  section.style.display='block';

  var tbody = document.querySelector('#callbackTable tbody');
  if(!tbody) return;
  tbody.innerHTML='';
  callbacks.forEach(function(t){
    var tr=document.createElement('tr');
    tr.dataset.id=t.id;
    tr.style.cursor='default';
    tr.innerHTML='<td>'+mc(t.number)+'</td>'+
      '<td><span class="date-chip">'+escHtml(t.createdAt)+'</span></td>'+
      '<td>'+mc(t.subject, true)+'</td>'+
      '<td><span class="status-badge '+getStatusCss(t.status)+'">'+escHtml(t.statusLabel)+'</span></td>';
    // Callback некликабелен (нет деталей)
    tbody.appendChild(tr);
    tr.querySelectorAll('.marquee-cell').forEach(bindMarquee);
  });
}

function showLoading(){
  var tbody=document.getElementById('tableBody');
  if(tbody) tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:#999;padding:32px">Загрузка...</td></tr>';
}

function showError(msg){
  var tbody=document.getElementById('tableBody');
  if(tbody) tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:#c00;padding:32px">'+escHtml(msg)+'</td></tr>';
}

// ---- Загрузка с сервера
async function loadTickets(){
  showLoading();
  try {
    allTickets = await TPPO.getTickets();
  } catch(e) {
    showError('Не удалось загрузить обращения: '+e.message);
    return;
  }
  renderTickets();
}

loadTickets();

// ---- Фильтры
document.querySelectorAll('.filter-chip').forEach(function(chip){
  chip.addEventListener('click',function(){
    document.querySelectorAll('.filter-chip').forEach(function(c){ c.classList.remove('active'); });
    chip.classList.add('active');
    renderTickets();
  });
});

// ---- Поиск
var searchInput=document.getElementById('searchInput');
if(searchInput) searchInput.addEventListener('input', function(){ renderTickets(); });

// ---- Кнопка создания обращения
var createBtn=document.getElementById('createTicketFullBtn');
if(createBtn) createBtn.addEventListener('click', function(){ window.location.href='НовоеОбращение.html'; });
</script>
</body>
</html>
